<!DOCTYPE html>
<html>
<head>
    <title>My Interactive Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #0b0b0b; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize map with 'Simple' coordinate system (for game images)
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2
        });

        // 2. Define the size of your map image (Width x Height in pixels)
        var w = 2000, h = 1500;
        var url = 'map-image.jpg'; // Put your image file name here!

        // 3. Calculate the edges of the map
        var southWest = map.unproject([0, h], map.getMaxZoom()-1);
        var northEast = map.unproject([w, 0], map.getMaxZoom()-1);
        var bounds = new L.LatLngBounds(southWest, northEast);

        // 4. Add the image to the map
        L.imageOverlay(url, bounds).addTo(map);

        // 5. Tell the map to focus on that image
        map.setMaxBounds(bounds);
        map.fitBounds(bounds);

        // 6. Add a test marker
        L.marker(map.unproject([1000, 750], map.getMaxZoom()-1)).addTo(map)
            .bindPopup("Center of the Map");
    </script>
</body>
</html>
