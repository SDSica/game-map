<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>My Phaser Game Map</title>
    <style>
        body { font-family: 'Press Start 2P', cursive; }
        canvas {
    image-rendering: -moz-crisp-edges;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    image-rendering: pixelated; /* Forces the browser to stay sharp */
}
        body { margin: 0; background-color: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    
        .animated-tile {
    background-repeat: no-repeat;
    image-rendering: pixelated; /* Keeps game art crisp */
    
    @keyframes tile-flash {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
}
}
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
